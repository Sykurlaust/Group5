      <stop offset="0%" stop-color="#7EE7FF"/>
      <stop offset="45%" stop-color="#2A8DEB"/>
      <stop offset="100%" stop-color="#1C4ED8"/>
    </linearGradient>
    <linearGradient id="gcNavRightWall" x1="0%" y1="0%" x2="100%" y2="0%">
