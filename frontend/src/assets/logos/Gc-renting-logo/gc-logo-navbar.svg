    <rect x="120" y="142" width="13" height="13" fill="#FFFFFF" opacity="0.95"/>
    <rect x="102" y="160" width="13" height="13" fill="#FFFFFF" opacity="0.95"/>
    <rect x="120" y="160" width="13" height="13" fill="#FFFFFF" opacity="0.95"/>
