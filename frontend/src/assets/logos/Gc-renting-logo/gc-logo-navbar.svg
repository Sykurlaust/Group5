<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-labelledby="gcLogoNavbarTitle gcLogoNavbarDesc">
  <title id="gcLogoNavbarTitle">GC Renting navbar logo</title>
  <desc id="gcLogoNavbarDesc">Compact blue house icon with serif GC Renting wordmark for navigation bars.</desc>
  <defs>
